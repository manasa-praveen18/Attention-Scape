<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attention-Scape</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="popup-header">
      <p class="eyebrow">Behavioral Browsing Intelligence</p>
      <h1>Attention-Scape</h1>
      <p id="total-events" class="subtitle">Loading...</p>
    </header>

    <section class="section">
      <p class="section-label">Top Sites Today</p>
      <ul id="top-sites"></ul>
    </section>

    <section class="section">
      <div class="toggle-row">
        <div>
          <p class="section-label" style="margin:0">Strict Privacy Mode</p>
          <p class="toggle-desc">Hide titles from health, banking and mail sites</p>
        </div>
        <label class="toggle">
          <input type="checkbox" id="strict-privacy-toggle" checked />
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <button id="open-dashboard">Open Full Dashboard</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
